<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}LOIP Review Console{% endblock %}</title>
  <link rel="stylesheet" href="/static/css/review-console.css">
  <style>
    /* Compatibility shim — review_detail.html was written against the previous
       palette. Bridge the old variable names to the new Review Console palette
       so existing pages don't render unstyled. */
    :root {
      --bg-gradient: var(--bg-grad);
      --surface-hover: var(--surface-3);
      --border: var(--line);
      --border-hover: var(--line-strong);
      --text: var(--fg);
      --text-heading: #ffffff;
      --muted: var(--fg-muted);
      --primary: var(--accent);
      --primary-hover: var(--accent-2);
      --primary-glow: var(--accent-soft);
      --success: var(--approve);
      --success-glow: var(--approve-soft);
      --warning: var(--review);
      --warning-glow: var(--review-soft);
      --danger: var(--reject);
      --danger-glow: var(--reject-soft);
      --info: var(--accent-2);
      --info-glow: var(--accent-soft);
      --card-shadow: var(--shadow);
    }
    /* The Console CSS hides inactive screens. With one screen per URL there is
       no SPA-style switching, so make .screen always visible. */
    .screen { display: block !important; }
  </style>
  {% block extra_head %}{% endblock %}
</head>
<body>
  <header class="topbar">
    <a href="/ui" style="text-decoration:none">
      <div class="brand">
        <span class="mark">L<span class="ring"></span>IP</span>
        <span class="sub">Review Console</span>
      </div>
    </a>
    <nav class="nav">
      <a href="/ui"        class="{% if active_page == 'dashboard' %}active{% endif %}">Dashboard</a>
      <a href="/ui/queue"  class="{% if active_page == 'queue' %}active{% endif %}">Queue</a>
      <a href="/docs"      target="_blank">API Docs</a>
      <a href="/healthz"   target="_blank">API Health</a>
    </nav>
    <div class="right">
      <span class="env-badge"><span class="dot"></span>Mock-mode</span>
      <div class="avatar">RV</div>
    </div>
  </header>

  <main>
    {% block content %}{% endblock %}
  </main>
</body>
</html>
