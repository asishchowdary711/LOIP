<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}LOIP Review{% endblock %}</title>
    <style>
        :root {
            --bg: #f8f9fa; --surface: #fff; --border: #dee2e6;
            --text: #212529; --muted: #6c757d; --primary: #0d6efd;
            --success: #198754; --danger: #dc3545; --warning: #ffc107;
            --info: #0dcaf0;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: var(--bg); color: var(--text); line-height: 1.5; }
        .container { max-width: 1400px; margin: 0 auto; padding: 0 1rem; }
        header { background: var(--surface); border-bottom: 1px solid var(--border); padding: 0.75rem 0; }
        header .container { display: flex; justify-content: space-between; align-items: center; }
        header h1 { font-size: 1.25rem; font-weight: 600; }
        header nav a { color: var(--muted); text-decoration: none; margin-left: 1.5rem; font-size: 0.875rem; }
        header nav a:hover, header nav a.active { color: var(--primary); }
        main { padding: 1.5rem 0; }
        .card { background: var(--surface); border: 1px solid var(--border); border-radius: 0.5rem; padding: 1.25rem; margin-bottom: 1rem; }
        .card h2 { font-size: 1rem; font-weight: 600; margin-bottom: 0.75rem; }
        table { width: 100%; border-collapse: collapse; font-size: 0.875rem; }
        th, td { padding: 0.5rem 0.75rem; text-align: left; border-bottom: 1px solid var(--border); }
        th { font-weight: 600; color: var(--muted); font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.05em; }
        tr:hover { background: #f8f9fa; }
        .badge { display: inline-block; padding: 0.2em 0.6em; border-radius: 0.25rem; font-size: 0.75rem; font-weight: 600; }
        .badge-approve { background: #d1e7dd; color: #0f5132; }
        .badge-review { background: #fff3cd; color: #664d03; }
        .badge-reject { background: #f8d7da; color: #842029; }
        .badge-pending { background: #e2e3e5; color: #41464b; }
        .badge-in_progress { background: #cff4fc; color: #055160; }
        .badge-completed { background: #d1e7dd; color: #0f5132; }
        .badge-escalated { background: #f8d7da; color: #842029; }
        .btn { display: inline-block; padding: 0.375rem 0.75rem; border: 1px solid transparent; border-radius: 0.375rem; font-size: 0.875rem; cursor: pointer; text-decoration: none; }
        .btn-primary { background: var(--primary); color: #fff; }
        .btn-success { background: var(--success); color: #fff; }
        .btn-danger { background: var(--danger); color: #fff; }
        .btn-outline { background: transparent; border-color: var(--border); color: var(--text); }
        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
        .grid-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 1rem; }
        .stat-card { text-align: center; }
        .stat-card .value { font-size: 2rem; font-weight: 700; }
        .stat-card .label { font-size: 0.75rem; color: var(--muted); text-transform: uppercase; }
        .field-row { display: flex; justify-content: space-between; padding: 0.4rem 0; border-bottom: 1px solid #f0f0f0; }
        .field-row .label { color: var(--muted); font-size: 0.8rem; }
        .field-row .value { font-weight: 500; }
        .confidence-bar { display: inline-block; width: 60px; height: 6px; background: #e9ecef; border-radius: 3px; overflow: hidden; vertical-align: middle; margin-left: 0.5rem; }
        .confidence-bar .fill { height: 100%; border-radius: 3px; }
        .shap-bar { display: flex; align-items: center; gap: 0.5rem; margin: 0.25rem 0; }
        .shap-bar .bar { height: 16px; border-radius: 2px; min-width: 2px; }
        .shap-positive { background: var(--success); }
        .shap-negative { background: var(--danger); }
        textarea, select, input[type="text"] { width: 100%; padding: 0.5rem; border: 1px solid var(--border); border-radius: 0.375rem; font-size: 0.875rem; font-family: inherit; }
        textarea { min-height: 80px; resize: vertical; }
        label { display: block; font-size: 0.8rem; font-weight: 600; color: var(--muted); margin-bottom: 0.25rem; margin-top: 0.75rem; }
        .alert { padding: 0.75rem 1rem; border-radius: 0.375rem; margin-bottom: 1rem; font-size: 0.875rem; }
        .alert-info { background: #cff4fc; color: #055160; }
        .alert-warning { background: #fff3cd; color: #664d03; }
        @media (max-width: 768px) { .grid-2, .grid-3 { grid-template-columns: 1fr; } }
    </style>
</head>
<body>
    <header>
        <div class="container">
            <h1>LOIP Review Console</h1>
            <nav>
                <a href="/ui" class="{% if active_page == 'dashboard' %}active{% endif %}">Dashboard</a>
                <a href="/ui/queue" class="{% if active_page == 'queue' %}active{% endif %}">Queue</a>
                <a href="/docs">API Docs</a>
                <a href="/health">API Health</a>
            </nav>
        </div>
    </header>
    <main>
        <div class="container">
            {% block content %}{% endblock %}
        </div>
    </main>
</body>
</html>
