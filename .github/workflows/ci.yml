name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        working-directory: loip
        run: pip install -e ".[dev]"

      # ruff/mypy currently have pre-existing failures across the codebase
      # (362 ruff findings, mostly S311/B008/E501/I001 predating this
      # workflow) — tracked separately. Run non-blocking until that debt is
      # paid down, then drop continue-on-error.
      - name: Lint (ruff)
        working-directory: loip
        run: ruff check .
        continue-on-error: true

      - name: Type check (mypy)
        working-directory: loip
        run: mypy .
        continue-on-error: true

      - name: Run tests
        working-directory: loip
        env:
          DATABASE_URL: sqlite+aiosqlite:///data/dev.db
        run: pytest -q

  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        working-directory: loip
        run: pip install -e ".[dev]"

      - name: pip-audit
        working-directory: loip
        run: pip-audit

      # bandit currently has pre-existing findings across the codebase (95
      # Low/13 Medium/1 High, mostly random.* usage in synthetic-data
      # generators and unpinned from_pretrained() calls) — tracked
      # separately. Run non-blocking until that debt is paid down, then drop
      # continue-on-error.
      - name: bandit
        working-directory: loip
        run: bandit -r . -x ./tests,./.venv,./.venv-ocr
        continue-on-error: true

      - name: safety
        working-directory: loip
        run: safety check
